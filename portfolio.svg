<?xml version="1.0" encoding="utf-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFCD3C"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&amp;display=swap');
      .styled-b {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
      }
    </style>
  </defs>
  <!-- Squircle Background -->
  <rect width="256" height="256" rx="60" fill="url(#brandGrad)"/>
  <!-- Bold Geometric 'B' Centered & Maximized to the Limit -->
  <text x="128" y="117" class="styled-b" font-size="240" fill="#0D0E15" text-anchor="middle" dominant-baseline="central">B</text>
</svg>
